name: 📝 Генерация поста

on:
  schedule:
    - cron: "0 7,13,19 * * *"
  workflow_dispatch:

concurrency:
  group: generate-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 + кэш
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Устанавливаем зависимости
        run: pip install -r requirements.txt

      - name: 🚀 Генерируем пост
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MODERATOR_ID: ${{ secrets.TELEGRAM_MODERATOR_ID }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
          OPENROUTER_KEY:        ${{ secrets.OPENROUTER_KEY }}
        run: python scripts/generate_post.py

      - name: 💾 Сохраняем данные
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name  "Neuro-News Bot"
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add data/
          git diff --staged --quiet || git commit -m "📊 Данные обновлены [skip ci]"
          git push || true
