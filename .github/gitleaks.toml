# Конфиг gitleaks. Расширяет дефолтные правила.
# Документация: https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

[allowlist]
description = "Игнорируем заведомо безопасные файлы и плейсхолдеры"
paths = [
    # Шаблон env-переменных с фейковыми значениями
    '''\.env\.example''',
    # Документация — может содержать примеры токенов
    '''.*\.md''',
    # Локальные настройки Claude Code
    '''\.claude/.*''',
    # Бэкапы и lock-файлы
    '''data/.*''',
    '''.*\.lock''',
]

# Дополнительные стоп-слова — то, что НЕ нужно считать утечкой
regexes = [
    '''github_pat_xxxxx''',
    '''123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11''',
]
